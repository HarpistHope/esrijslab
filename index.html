<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hello, world!</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />

  <!-- call the arcis api css and js library -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

<!-- add require statement to call modules necessary for full screen map app -->
  <script>  

      require([
        "esri/config", 
        "esri/Map", 
        "esri/views/MapView",
        "esri/widgets/BasemapGallery",
        "esri/widgets/Locate",
        "esri/widgets/Search",
        "esri/widgets/Expand" // adding to improve basemap gallery UI/UX
      ], function(esriConfig, Map, MapView, BasemapGallery, Locate, Search, Expand) {   
      
        // set API key and create map with basemap layer
        esriConfig.apiKey = "AAPTaZ2rQpZ3e_kAjLMbAoRHR0g.._fqqp4bDNHHZdzTSsp9AO-QkJHtKqpaj-7Xv25F1YGAftgihPfF0YtKx3TlgjV1fIfgz5d5KD1tO1WludBUUE8UK14qZyasG6wdcyVgej-0RvTJlT6Cqr8NSnHJs2CR-QKtZ6cx1a-DlDQQytvHfcbHYyH2--XMqzLkkWez9t3HIMhqczJVoVTeXmERX-Sc_6OCF9zTuUnAuesDvugrzl5GUAN3LGTz2Zteo1pZkcrVPu2RRO94cFDhn8pvWIVGFeUSd7-icAT1_FDhHahp4";
        const map = new Map({ 
          basemap: "arcgis-community" // Challenge 2: Change intial basemap layer; I like the look of the arcgis-community basemap
        });

        // Challenge 1: Set new center and zoom level
        // create map view, set center and zoom level, set container property to viewDiv
        const view = new MapView({
          map: map,
          center: [140.75, 41.78], // Longitude, latitude - centered on Hakodate, Japan
          container: "viewDiv", // Div element
          scale: 70000 // scale level
        });


        // Challenge 3: add basemap gallery
        // create basemap gallery widget inside expand widget
        const basemapGallery = new BasemapGallery({
          view: view
        });
        const bmgExpand = new Expand({
          view: view, 
          content: basemapGallery,
          expandIcon: "basemap" // use basemap icon for expand widget
        })

        // Add basemap gallery expand widget to the top right corner of the view
        view.ui.add(bmgExpand, {
          position: "top-right"
        });

        // Challenge 4: add locate widget
        // create locate widget 
        const locateWidget = new Locate({
          view: view
        });
        // add locate widget to the top left corner of the view, below other elements
        view.ui.add(locateWidget, {
          position: "top-left",
          index: 2
        });

        // Challenge 5: add search bar
        // create search widget
        const searchWidget = new Search({
          view: view
        });
        // Add search widget in top left corner of the view, above locate widget
        view.ui.add(searchWidget, {
          position: "top-left",
          index: 0
        });

      });  

  </script>

  <!-- use css to style full-screen map -->
  <style>  
    html,  
    body,  
    #viewDiv {  
      padding: 0;  
      margin: 0;  
      height: 100%;  
      width: 100%;  
    }  
  </style> 

</head>
<body>

  <!-- create div to hold the map  -->
  <div id="viewDiv"></div> 

</body>
</html>
