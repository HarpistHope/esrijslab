<!DOCTYPE html>
<html lang="en">
<head>
  <title>Hello, world!</title>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="" />

  <!-- call the arcis api css and js library -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.25/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.25/"></script>

<!-- add require statement to call modules necessary for full screen map app -->
  <script>  

      require([
        "esri/config", 
        "esri/Map", 
        "esri/views/MapView",
        "esri/widgets/BasemapGallery"
      ], function(esriConfig, Map, MapView, BasemapGallery) {   
      
        // set API key and create map with basemap layer
        esriConfig.apiKey = "AAPTaZ2rQpZ3e_kAjLMbAoRHR0g.._fqqp4bDNHHZdzTSsp9AO-QkJHtKqpaj-7Xv25F1YGAftgihPfF0YtKx3TlgjV1fIfgz5d5KD1tO1WludBUUE8UK14qZyasG6wdcyVgej-0RvTJlT6Cqr8NSnHJs2CR-QKtZ6cx1a-DlDQQytvHfcbHYyH2--XMqzLkkWez9t3HIMhqczJVoVTeXmERX-Sc_6OCF9zTuUnAuesDvugrzl5GUAN3LGTz2Zteo1pZkcrVPu2RRO94cFDhn8pvWIVGFeUSd7-icAT1_FDhHahp4";
        const map = new Map({ 
          basemap: "osm-style-relief" // Basemap layer service 
        });

        // create map view, set center and zoom level, set container property to viewDiv
        const view = new MapView({
          map: map,
          center: [140.73, 41.80], // Longitude, latitude - centered on Hakodate, Japan
          container: "viewDiv", // Div element
          scale: 75000
        });


        // add basemap gallery widget to the map view
        const basemapGallery = new BasemapGallery({
          view: view
        });
        // Add widget to the top right corner of the view
        view.ui.add(basemapGallery, {
          position: "top-right"
        });
      });  

  </script>

  <!-- use css to style full-screen map -->
  <style>  
    html,  
    body,  
    #viewDiv {  
      padding: 0;  
      margin: 0;  
      height: 100%;  
      width: 100%;  
    }  
  </style> 

</head>
<body>

  <!-- create div to hold the map  -->
  <div id="viewDiv"></div> 

</body>
</html>
